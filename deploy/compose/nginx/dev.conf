# dev 環境路由(無 TLS);正式環境設定見 docs/DEPLOYMENT.md §1.4
server {
  listen 80;
  server_name _;

  # registry v2 大檔需求(docs/TROUBLESHOOTING.md §5.5)
  client_max_body_size 0;
  proxy_request_buffering off;
  proxy_buffering off;
  proxy_read_timeout 900s;
  chunked_transfer_encoding on;

  location /pulp/ { proxy_pass http://pulp:80; proxy_set_header Host $host; }
  location /v2/   { proxy_pass http://pulp:80; proxy_set_header Host $host; }

  # BFF(FastAPI);/api 前綴由 BFF 自己的路由承接(/api/v1/…)
  location /api/ { proxy_pass http://bff:8000; proxy_set_header Host $host; }

  # 前端 SPA(fallback 在 frontend 容器內處理)
  location / { proxy_pass http://frontend:8080; proxy_set_header Host $host; }
}
