# 前端容器內的 nginx(SPA);對外路由由外層 reverse proxy 處理
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;

  # SPA fallback:非實體檔案一律回 index.html
  location / {
    try_files $uri /index.html;
  }

  # hashed assets 可長期快取;index.html / config.js 不快取
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
  location = /config.js {
    add_header Cache-Control "no-store";
  }
}
